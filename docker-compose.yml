services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data   
    restart: unless-stopped

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    volumes:
      - ./data:/data/db
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    restart: unless-stopped

volumes:
  cloudbeaver_data: