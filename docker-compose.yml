services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:$${APP_PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    
volumes:
  sqlite_data: